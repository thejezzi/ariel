<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs Renderer</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app-layout">
        <aside class="app-sidebar">
          <div class="app-sidebar-scroll">
            <button id="search-trigger" class="search-trigger" type="button" aria-label="Open search">Search docs</button>
            <nav id="sidebar-tree"></nav>
          </div>
          <div class="app-sidebar-footer">
            <label class="app-theme-label">
              <span>Theme</span>
              <select id="theme-select" aria-label="Theme" class="app-theme-select">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="dracula">Dracula</option>
                <option value="tokyo-night">Tokyo Night</option>
                <option value="catppuccin">Catppuccin</option>
                <option value="sublime">Sublime</option>
              </select>
            </label>
          </div>
        </aside>

        <main class="app-main">
          <div class="app-main-inner">
            <div class="page-toolbar">
              <nav id="breadcrumbs" class="breadcrumbs"></nav>
            </div>
            <article id="page-content" class="doc-prose"></article>
          </div>
        </main>

        <aside class="app-toc">
          <div class="app-toc-title">On this page</div>
          <nav id="page-toc"></nav>
        </aside>
      </div>
    </div>

    <button id="clear-search-highlights" class="clear-search-highlights clear-search-highlights-floating" type="button" hidden>Clear highlights</button>
    <div id="page-processing-toast" class="page-processing-toast" hidden>Processing links and page metadata…</div>

    <div id="search-overlay" class="search-overlay" hidden>
      <div class="search-modal">
        <input id="search-input" class="search-input search-input-modal" type="search" placeholder="Search docs" aria-label="Search docs" />
        <div id="search-results" class="search-results-modal"></div>
      </div>
    </div>

    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
